security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        health:
            pattern: ^/health/
            security: false

        internal:
            pattern: ^/api/v1/internal/
            security: false

        ingest:
            pattern: ^/api/v1/(sites/handshake|heartbeat|metrics/batch|events/batch|module/config)
            security: false

        auth:
            pattern: ^/api/v1/auth/(register|login)$
            security: false

        api:
            pattern: ^/api/
            stateless: true
            provider: app_user_provider
            custom_authenticators:
                - App\Security\ApiTokenAuthenticator

    access_control:
        - { path: ^/api/v1/auth/me, roles: ROLE_USER }
        - { path: ^/api/v1/sites, roles: ROLE_USER }
        - { path: ^/api/v1/incidents, roles: ROLE_USER }
        - { path: ^/api/v1/notification-channels, roles: ROLE_USER }
        - { path: ^/api/v1/organization, roles: ROLE_USER }
        - { path: ^/api/v1/admin, roles: ROLE_PLATFORM_ADMIN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
